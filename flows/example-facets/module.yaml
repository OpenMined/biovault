apiVersion: syftbox.openmined.org/v1alpha1
kind: Module
metadata:
  name: example-facets
  version: 0.1.0
  description: Example facet-aware flow that aggregates simple variant counts by participant metadata facets.
  authors:
    - biovault@example
spec:
  runner:
    kind: nextflow
    entrypoint: workflow.nf
    template: dynamic-nextflow
  assets: []
  inputs:
    - name: participants
      type: List[GenotypeRecord]
      description: CSV/TSV with participant_id, genotype_file, and optional facet columns such as country and split.
      format:
        kind: csv
        mapping:
          participant_id: participant_id
          genotype_file: genotype_file
  outputs:
    - name: facet_counts
      type: File
      description: Aggregate counts grouped by facet column and facet value.
      format:
        kind: tsv
      path: facet_counts.tsv
    - name: participant_counts
      type: File
      description: Per-participant counts with facet columns preserved.
      format:
        kind: tsv
      path: participant_counts.tsv
  parameters: []
